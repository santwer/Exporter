site_name: Word Template Exporter
site_description: Laravel package for Word template exports (.docx / .pdf) with placeholders, based on PHPWord.
site_url: https://santwerexporter.readthedocs.io/
site_author: santwer
copyright: Copyright &copy; santwer. Documentation licensed under CC BY 4.0.

repo_url: https://github.com/santwer/Exporter
repo_name: santwer/Exporter
edit_uri: edit/master/docs/

docs_dir: docs
theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.details
  # Highlighting: Pygments erkennt php, bash, json, yaml, etc. automatisch — keine Sprachliste nötig.
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Quick Start: quickstart.md
  - Export Classes: export-classes.md
  - Concerns & Interfaces: concerns.md
  - Template Syntax: template-syntax.md
  - Template Resolution: template-resolution.md
  - XML Escaping & Security: xml-escaping.md
  - Charts: charts.md
  - Images: images.md
  - Tables: tables.md
  - Checkboxes: checkboxes.md
  - Batch & Queue: batch-and-queue.md
  - Exportable (Deprecated): exportable-deprecated.md
  - Processors (Reference): processors.md
